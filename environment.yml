# HyGEARS conda environment
# Resolves dependency conflicts between GEARS and hypeGRL.
#
# Create:  conda env create -f environment.yml
# Update:  conda env update -f environment.yml --prune
# Activate: conda activate hygears

name: hygears

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # PyTorch — pinned to match hypeGRL's requirement (GEARS leaves it unpinned)
  # Choose ONE of the two blocks below depending on your hardware, then delete the other.

  # --- GPU (CUDA 12.x) ---
  - pytorch=2.8.0
  - pytorch-cuda=12.1
  # - torchvision          # uncomment if needed

  # --- CPU only (comment out the GPU block above first) ---
  # - pytorch=2.8.0
  # - cpuonly

  - pip:
    # ── Shared core (versions reconciled between GEARS and hypeGRL) ──
    - numpy==1.26.4           # both agree
    - scipy==1.14.1           # GEARS pins 1.14.1; hypeGRL pins 1.13.1 (older) — 1.14.x is backward-compatible
    - pandas==2.3.3           # hypeGRL>=2.3.3; GEARS pinned 2.2.2 — 2.3.x is backward-compatible
    - scikit-learn==1.7.2     # hypeGRL>=1.7.2; GEARS pinned 1.5.1 — 1.7.x is backward-compatible
    - networkx==3.5           # hypeGRL>=3.5; GEARS pinned 3.3
    - tqdm==4.67.1            # hypeGRL>=4.67.1; GEARS pinned 4.66.5
    - matplotlib==3.10.7
    - seaborn==0.13.2

    # ── GEARS-specific ──
    - torch_geometric==2.6.1  # matched to torch 2.8.0
    - scanpy==1.10.2
    - dcor

    # ── hypeGRL-specific ──
    - tensorboardx==2.6.4
    - gensim==4.3.3
    - graspologic==3.4.4
    - ogb==1.3.6
    - pybind11==3.0.1

    # ── HyGEARS itself (editable install so gears/ is importable) ──
    - -e .

    # ── OPTIONAL: tensorflow is only needed for hypeGRL embedding types
    #    that rely on it (e.g. some Poincaré Maps variants). Heavy (~500 MB).
    #    Uncomment if you get ImportError from hypeGRL:
    # - tensorflow==2.17.1
